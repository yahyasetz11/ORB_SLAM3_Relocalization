%YAML:1.0

#--------------------------------------------------------------------------------------------
# Camera Parameters. Adjust them!
#--------------------------------------------------------------------------------------------
File.version: "1.0"

Camera.type: "PinHole"

# Camera calibration and distortion parameters (OpenCV) 
Camera1.fx: 517.306408
Camera1.fy: 516.469215
Camera1.cx: 318.643040
Camera1.cy: 255.313989

Camera1.k1: 0.262383
Camera1.k2: -0.953104
Camera1.p1: -0.005358
Camera1.p2: 0.002628
Camera1.k3: 1.163314

# Camera frames per second 
Camera.fps: 30

# Color order of the images (0: BGR, 1: RGB. It is ignored if images are grayscale)
Camera.RGB: 1

# Camera resolution
Camera.width: 640
Camera.height: 480

#--------------------------------------------------------------------------------------------
# ORB Parameters
#--------------------------------------------------------------------------------------------

# ORB Extractor: Number of features per image
ORBextractor.nFeatures: 1000

# ORB Extractor: Scale factor between levels in the scale pyramid 	
ORBextractor.scaleFactor: 1.2

# ORB Extractor: Number of levels in the scale pyramid	
ORBextractor.nLevels: 8

# ORB Extractor: Fast threshold
# Image is divided in a grid. At each cell FAST are extracted imposing a minimum response.
# Firstly we impose iniThFAST. If no corners are detected we impose a lower value minThFAST
# You can lower these values if your images have low contrast			
ORBextractor.iniThFAST: 20
ORBextractor.minThFAST: 7

System.SaveAtlasToFile: "../../ORB_SLAM3_Relocalization/maps/map1"
System.LoadAtlasFromFile: "../../ORB_SLAM3_Relocalization/maps/map"

#--------------------------------------------------------------------------------------------
# Viewer Parameters
#--------------------------------------------------------------------------------------------
Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -1.8
Viewer.ViewpointF: 500.0

# ========== DBoW2 Parameters (for COMPLETELY_LOST state) ==========
Relocalization.BowSimilarityThreshold: 0.018
Relocalization.MinInliers: 10
Relocalization.MinMatches: 10
Relocalization.MaxCandidates: 5

# ========== LSH Parameters (for CURRENTLY_LOST state) ==========
# Based on paper: "Fast Relocalization for Visual Odometry Using Binary Features"

# Visibility radius for local search (meters)
# Paper uses 5.0m based on typical walking speed
Relocalization.VisibilityRadius: 5.0

# LSH hash table configuration (optimal from paper)
Relocalization.LSH.NumTables: 11
Relocalization.LSH.NumBits: 14
Relocalization.LSH.HammingThreshold: 50

# PROSAC parameters
Relocalization.PROSAC.MaxIterations: 100
Relocalization.PROSAC.ReprojectionError: 8.0
Relocalization.PROSAC.Confidence: 0.99

# ========== State Machine Parameters ==========
# Timeout before giving up on LSH and falling back to DBoW2 (seconds)
Relocalization.LostTimeout: 30.0

# Frame skip for relocalization attempts (both DBoW2 and LSH)
# 5 = try every 5th frame to reduce computation
Relocalization.FrameSkip: 5

# Position smoothing when LSH corrects VisOdom drift
# 0.0 = instant jump, 1.0 = no correction, 0.3 = smooth blend (recommended)
Relocalization.SmoothingFactor: 0.3

# Number of frames to smooth over
Relocalization.SmoothingFrames: 10